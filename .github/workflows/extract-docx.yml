name: Extract DOCX documents

on:
  push:
    branches:
      - agent/update-dialect-wakeword-test-reports
    paths:
      - 'docs/**/*.docx'
      - '.github/workflows/extract-docx.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/update-dialect-wakeword-test-reports
      - name: Extract Word document text
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import zipfile
          import xml.etree.ElementTree as ET

          NS = {'w': 'http://schemas.openxmlformats.org/wordprocessingml/2006/main'}
          W = '{http://schemas.openxmlformats.org/wordprocessingml/2006/main}'

          def paragraph_text(node):
              chunks = []
              for child in node.iter():
                  if child.tag == W + 't':
                      chunks.append(child.text or '')
                  elif child.tag == W + 'tab':
                      chunks.append('\t')
                  elif child.tag in (W + 'br', W + 'cr'):
                      chunks.append('\n')
              return ''.join(chunks).strip()

          def extract_docx(path: Path):
              with zipfile.ZipFile(path) as zf:
                  xml = zf.read('word/document.xml')
              root = ET.fromstring(xml)
              body = root.find('w:body', NS)
              lines = []
              for child in list(body):
                  if child.tag == W + 'p':
                      text = paragraph_text(child)
                      if text:
                          lines.append(text)
                          lines.append('')
                  elif child.tag == W + 'tbl':
                      for row in child.findall('.//w:tr', NS):
                          cells = []
                          for cell in row.findall('./w:tc', NS):
                              parts = [paragraph_text(p) for p in cell.findall('.//w:p', NS)]
                              cells.append(' / '.join(p for p in parts if p).replace('|', '\\|'))
                          if cells:
                              lines.append('| ' + ' | '.join(cells) + ' |')
                      lines.append('')
              text = '\n'.join(lines)
              text = re.sub(r'\n{3,}', '\n\n', text).strip() + '\n'
              return text

          out_dir = Path('extracted_docs')
          out_dir.mkdir(exist_ok=True)
          for docx in sorted(Path('docs').glob('*.docx')):
              output = out_dir / f'{docx.name}.md'
              output.write_text(f'# {docx.name}\n\n' + extract_docx(docx), encoding='utf-8')
              print(f'Extracted {docx} -> {output}')
          PY
      - name: Commit extracted text
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add extracted_docs
          if git diff --cached --quiet; then
            echo 'No extraction changes.'
          else
            git commit -m 'Extract DOCX text for requirements review'
            git push
          fi
