name: Correct report branch metadata

on:
  push:
    branches:
      - agent/qingxier-v1-1-solution-tests
    paths:
      - '.github/workflows/fix-report-branch-metadata.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  correct:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/qingxier-v1-1-solution-tests
      - name: Correct comprehensive report branch metadata
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('reports/庆喜儿项目综合测试报告_V1.1.md')
          text = path.read_text(encoding='utf-8')
          old = 'agent/update-dialect-wakeword-test-reports'
          new = 'agent/qingxier-v1-1-solution-tests'
          if old not in text and new not in text:
              raise SystemExit('Expected branch metadata not found')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          grep -F 'agent/qingxier-v1-1-solution-tests' 'reports/庆喜儿项目综合测试报告_V1.1.md'
      - name: Commit correction
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add 'reports/庆喜儿项目综合测试报告_V1.1.md'
          if git diff --cached --quiet; then
            echo 'Report metadata already correct.'
          else
            git commit -m 'Correct comprehensive report branch metadata'
            git push
          fi
