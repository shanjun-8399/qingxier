name: Server implementation tests

on:
  push:
    branches:
      - agent/qingxier-v1-1-solution-tests
    paths:
      - 'server/**'
      - 'reports/服务器代码实施测试报告_V1.2.md'
      - '.github/workflows/server-tests.yml'
  pull_request:
    paths:
      - 'server/**'
      - 'reports/服务器代码实施测试报告_V1.2.md'
      - '.github/workflows/server-tests.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: |
            server/requirements.txt
            server/requirements-dev.txt
      - name: Install dependencies
        working-directory: server
        run: pip install -r requirements-dev.txt
      - name: Compile
        working-directory: server
        run: python -m compileall -q qingxier_server tests scripts
      - name: Run server tests with coverage
        working-directory: server
        run: |
          mkdir -p ../reports
          pytest -q \
            --junitxml=../reports/server-junit.xml \
            --cov=qingxier_server \
            --cov-report=term-missing \
            --cov-report=xml:../reports/server-coverage.xml \
            --cov-fail-under=80
          python scripts/generate_test_summary.py \
            --junit ../reports/server-junit.xml \
            --coverage ../reports/server-coverage.xml \
            --output ../reports/server-test-summary.json
      - name: Process-level HTTP smoke test
        working-directory: server
        env:
          APP_ENV: test
          SPEECH_WS_BASE_URL: wss://voice.test/ws/v1/voice
        run: |
          uvicorn qingxier_server.main:app --host 127.0.0.1 --port 8765 \
            > ../reports/server-uvicorn-console.txt 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          passed=0
          for attempt in $(seq 1 50); do
            if BASE_URL=http://127.0.0.1:8765 \
              python scripts/smoke_test.py \
              | tee ../reports/server-smoke-console.txt; then
              passed=1
              break
            fi
            sleep 0.1
          done
          test "$passed" -eq 1
      - name: Upload evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qingxier-server-test-evidence
          path: |
            reports/server-junit.xml
            reports/server-coverage.xml
            reports/server-test-summary.json
            reports/server-smoke-console.txt
            reports/server-uvicorn-console.txt
