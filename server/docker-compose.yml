services:
  api:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      mongo:
        condition: service_healthy
      emqx:
        condition: service_started
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  emqx:
    image: emqx/emqx:5.8
    environment:
      EMQX_DASHBOARD__DEFAULT_USERNAME: admin
      EMQX_DASHBOARD__DEFAULT_PASSWORD: change-me-before-production
    ports:
      - "1883:1883"
      - "18083:18083"
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-log:/opt/emqx/log
    restart: unless-stopped

volumes:
  mongo-data:
  emqx-data:
  emqx-log:
